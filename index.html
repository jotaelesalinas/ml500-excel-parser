<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML500 Excel Parser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; color: #333; }
        h1 { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
        input[type="text"], input[type="password"], input[type="number"], textarea {
            width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;
        }
        input:disabled { background: #f6f6f6; color: #888; }
        textarea { min-height: 168px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .field { margin-bottom: 1rem; }
        .field small { color: #666; }
        .input-groups { display: flex; flex-direction: column; gap: 1.5rem; }
        .group {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1.5rem;
            align-items: start;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .actions {
            display: flex;
            justify-content: flex-start;
        }
        button {
            padding: 0.6rem 1.5rem; background: #1a73e8; color: #fff; border: none;
            border-radius: 4px; font-size: 1rem; cursor: pointer;
        }
        button:hover { background: #1557b0; }
        button:disabled { background: #999; cursor: not-allowed; }
        .toggle-field {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            display: inline-flex;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #d3d3d3;
            border-radius: 999px;
            transition: background 0.2s ease;
            cursor: pointer;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }
        .toggle-switch input:checked + .toggle-slider { background: #1a73e8; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
        #status { margin-top: 1rem; padding: 0.8rem; border-radius: 4px; display: none; }
        #status.error { display: block; background: #fce8e6; color: #c5221f; }
        #status.info { display: block; background: #e8f0fe; color: #1a73e8; }
        #results { margin-top: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th, td { padding: 0.5rem 0.75rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .tab-log-link { color: #1a73e8; text-decoration: underline; text-underline-offset: 0.15rem; }
        .tab-log-link:hover { color: #1557b0; }
        .action-log-section { margin-top: 1.25rem; }
        .action-log-section h2 { font-size: 1rem; margin-bottom: 0.45rem; color: #555; }
        .secondary-log-table { font-size: 0.88rem; color: #6a6a6a; }
        .secondary-log-table th { background: #fafafa; color: #707070; font-weight: 500; }
        .secondary-log-table tbody tr.log-row-type-deposit { background: #f7fbff; }
        .secondary-log-table tbody tr.log-row-type-buy { background: #f7fcf7; }
        .secondary-log-table tbody tr.log-row-type-sell { background: #fffaf4; }
        .secondary-log-table tbody tr.log-row-type-diff { background: #f6fbfb; }
        .secondary-log-table tbody tr.log-row-type-final { background: #fafafa; }
        @media (max-width: 800px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>ML500 Excel Parser</h1>

    <div class="input-groups">
        <section class="group">
            <div class="form-grid">
                <div>
                    <div class="field">
                        <label for="spreadsheet-url">Google Sheets URL</label>
                        <input type="text" id="spreadsheet-url" placeholder="https://docs.google.com/spreadsheets/d/...">
                    </div>

                    <div class="field">
                        <label for="api-key">Google API Key</label>
                        <input type="password" id="api-key" placeholder="AIza...">
                        <small>Needs Google Sheets API enabled. Not stored anywhere.</small>
                    </div>
                </div>

                <div class="field field-group">
                    <label for="bulk-input">Bulk input</label>
                    <textarea id="bulk-input" placeholder="Line 1: Google Sheets URL&#10;Line 2: Google API Key&#10;Line 3: First N values&#10;Line 4: Minimum deposit&#10;Line 5: Minimum investment&#10;Line 6: Reinvest (true/false)"></textarea>
                    <small>If this textarea has content, its first non-empty trimmed lines populate the form before loading.</small>
                </div>
            </div>

            <div class="actions">
                <button id="btn-load-data">Load data</button>
            </div>
        </section>

        <section class="group">
            <div class="form-grid">
                <div>
                    <div class="field">
                        <label for="first-n">First N values (comma-separated)</label>
                        <input type="text" id="first-n" value="4, 10">
                    </div>

                    <div class="field">
                        <label for="min-deposit">Minimum deposit</label>
                        <input type="number" id="min-deposit" value="1000" min="1" step="1">
                    </div>

                    <div class="field">
                        <label for="min-investment">Minimum investment</label>
                        <input type="number" id="min-investment" value="200" min="1" step="1">
                    </div>
                </div>

                <div>
                    <div class="field toggle-field">
                        <label for="reinvest">Reinvest</label>
                        <label class="toggle-switch" for="reinvest">
                            <input type="checkbox" id="reinvest">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="btn-calculate">Calculate</button>
            </div>
        </section>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
